name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate fixed keystore
        run: |
          keytool -genkeypair \
            -alias arrowescape \
            -keypass arrowescape123 \
            -keystore arrowescape.jks \
            -storepass arrowescape123 \
            -dname "CN=Dev, OU=GEC, O=ArrowEscape, L=Gandhinagar, S=Gujarat, C=IN" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/arrowescape.jks \
            -Pandroid.injected.signing.store.password=arrowescape123 \
            -Pandroid.injected.signing.key.alias=arrowescape \
            -Pandroid.injected.signing.key.password=arrowescape123 \
            --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArrowEscape
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: Arrow Escape v2.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            Download app-release.apk and install on your phone.
            Same signing key - updates install without uninstalling!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
